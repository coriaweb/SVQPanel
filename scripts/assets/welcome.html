<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Servidor web</title>
    <style>
        :root { color-scheme: light dark; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                         Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b1020;
            color: #e6e9f0;
            padding: 2rem;
        }
        .card {
            max-width: 480px;
            text-align: center;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 3rem 2.5rem;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
        }
        .logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 1.5rem;
            border-radius: 12px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
        }
        h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.75rem; }
        p { color: #9aa3b8; line-height: 1.6; font-size: 0.95rem; }
        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #5b6478;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🌐</div>
        <h1>El servidor web está funcionando</h1>
        <p>
            Esta página confirma que el servidor está activo y operativo.
            Si esperabas ver un sitio web concreto, comprueba que el nombre
            de dominio apunta correctamente a este servidor.
        </p>
        <div class="footer">Powered by SVQPanel</div>
    </div>
</body>
</html>
