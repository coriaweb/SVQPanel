# Fail2Ban action para SVQPanel — escribe los baneos en los sets de la tabla
# 'inet svqpanel' (f2b_v4 / f2b_v6), que YA tienen reglas drop para IPv4 e IPv6.
#
# Ventajas frente a nftables-multiport (la action por defecto):
#   - Cubre IPv4 E IPv6 con las reglas que el install ya creó en la tabla del
#     panel (ip saddr @f2b_v4 drop / ip6 saddr @f2b_v6 drop).
#   - Unifica baneos de fail2ban y de la UI del panel en los mismos sets.
#   - No crea una tabla nftables aparte.
#
# Los sets usan 'flags timeout', así que pasamos el bantime como timeout para
# que el desbaneo sea automático aunque fail2ban se reinicie.

[Definition]

# No hace falta crear nada: los sets f2b_v4/f2b_v6 y sus reglas drop los crea
# install.sh al levantar la tabla 'inet svqpanel'. actionstart/stop se dejan
# vacíos a propósito (la tabla persiste y la gestiona el panel).
actionstart =
actionstop =
actioncheck =

# <family> lo resuelve fail2ban: 'inet4' -> ipv4, 'inet6' -> ipv6.
# Seleccionamos el set según la familia de la IP baneada.
actionban = if [ "<family>" = "inet6" ]; then \
                nft add element inet svqpanel f2b_v6 "{ <ip> timeout <bantime>s }"; \
            else \
                nft add element inet svqpanel f2b_v4 "{ <ip> timeout <bantime>s }"; \
            fi

actionunban = if [ "<family>" = "inet6" ]; then \
                  nft delete element inet svqpanel f2b_v6 "{ <ip> }" 2>/dev/null || true; \
              else \
                  nft delete element inet svqpanel f2b_v4 "{ <ip> }" 2>/dev/null || true; \
              fi

[Init]
