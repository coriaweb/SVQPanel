name: CI

# Se ejecuta en cada push y en cada pull request a main.
# Objetivo: detectar ANTES de producción que un cambio rompe algo:
#   - errores de sintaxis Python (py_compile de todo el proyecto)
#   - errores de sintaxis en los scripts shell (install.sh, updates, …)
#   - fallos en los tests (unitarios + generación de vhosts)
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Comprobar sintaxis Python (py_compile de todo el proyecto)
        run: |
          python -m compileall -q api scripts config
          echo "Sintaxis Python OK"

      - name: Comprobar sintaxis de los scripts shell (bash -n)
        run: |
          set -e
          for f in install.sh install_mail.sh update.sh updates/*.sh; do
            [ -f "$f" ] || continue
            bash -n "$f" && echo "OK  $f"
          done

      - name: Ejecutar tests (pytest)
        run: |
          python -m pytest tests/ -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar y construir el frontend
        working-directory: frontend
        run: |
          npm ci || npm install
          npm run build
          echo "Build del frontend OK"
