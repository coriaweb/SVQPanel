<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel no disponible — SVQPanel</title>
  <style>
    :root { --navy:#0d1424; --navy2:#1a2547; --orange:#f08a2a; }
    * { box-sizing:border-box; margin:0; padding:0; }
    html,body { height:100%; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:radial-gradient(1200px 600px at 50% -10%, rgba(240,138,42,.12), transparent),
                 linear-gradient(160deg,#0d1424,#1a2547);
      color:#e9edf5; display:flex; align-items:center; justify-content:center;
      min-height:100%; padding:24px;
    }
    .card {
      max-width:480px; width:100%; text-align:center;
      background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);
      border-radius:16px; padding:48px 36px; backdrop-filter:blur(6px);
    }
    .logo { font-size:26px; font-weight:800; letter-spacing:-.01em; margin-bottom:28px; }
    .logo span { color:var(--orange); }
    .icon {
      width:72px; height:72px; margin:0 auto 22px; border-radius:50%;
      display:grid; place-items:center; font-size:34px;
      background:rgba(240,138,42,.15); color:var(--orange);
    }
    h1 { font-size:22px; font-weight:700; margin-bottom:12px; }
    p { font-size:15px; line-height:1.6; color:#aab4c5; margin-bottom:8px; }
    .hint { font-size:13px; color:#7a86a0; margin-top:20px; }
    .hint code { background:rgba(255,255,255,.08); padding:2px 6px; border-radius:4px; }
    .retry {
      margin-top:26px; display:inline-flex; align-items:center; gap:8px;
      background:var(--orange); color:#fff; text-decoration:none;
      padding:11px 22px; border-radius:8px; font-weight:600; font-size:14px;
      border:none; cursor:pointer; transition:transform .15s, opacity .15s;
    }
    .retry:hover { transform:translateY(-1px); opacity:.92; }
    .spinner {
      width:14px; height:14px; border:2px solid rgba(255,255,255,.4);
      border-top-color:#fff; border-radius:50%; animation:spin .8s linear infinite;
      display:none;
    }
    .retry.loading .spinner { display:inline-block; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">SVQ<span>Panel</span></div>
    <div class="icon">&#9888;</div>
    <h1>El panel no está disponible</h1>
    <p>El servicio del panel se está reiniciando o no responde en este momento.</p>
    <p>Suele resolverse en unos segundos. Esto <strong>no afecta</strong> a los sitios web ni al correo de tus clientes, que siguen funcionando.</p>
    <button class="retry" id="retry" onclick="reintentar()">
      <span class="spinner"></span>
      <span id="retry-text">Reintentar</span>
    </button>
    <p class="hint">Si persiste, revisa por SSH: <code>systemctl status svqpanel</code></p>
  </div>
  <script>
    function reintentar() {
      var b = document.getElementById('retry');
      b.classList.add('loading');
      document.getElementById('retry-text').textContent = 'Comprobando…';
      setTimeout(function () { location.reload(); }, 800);
    }
    // Auto-reintento cada 10s por si el backend vuelve solo
    setTimeout(function () { location.reload(); }, 10000);
  </script>
</body>
</html>
